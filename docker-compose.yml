version: '3.8'
services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      # THIS IS FOR DEVELOPMENT ONLY. Use environment variables in production.
      POSTGRES_DB: property_management
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # S3-compatible object store for receipt PDFs (Phase 04).
  # Swap to real AWS S3 in prod by unsetting AWS_S3_ENDPOINT in the API env.
  minio:
    image: minio/minio:latest
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web console
    command: server /data --console-address ':9001'
    volumes:
      - minio_data:/data

  # Redis for the BullMQ receipt-pdf worker queue (Phase 04).
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  minio_data:
  redis_data:
