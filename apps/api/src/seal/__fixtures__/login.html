<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion - SEAL Oficina Virtual</title>
</head>
<body>
    <div class="container body-content">
        <h2>Iniciar Sesion</h2>
        <form action="/Home/Login" class="form-horizontal" method="post" role="form">
            <input name="__RequestVerificationToken" type="hidden" value="abc123csrf_token_value_xyz" />
            <div class="form-group">
                <label class="col-md-2 control-label" for="CorreoElectronico">Correo Electronico</label>
                <div class="col-md-10">
                    <input class="form-control" id="CorreoElectronico" name="CorreoElectronico" type="text" value="" />
                </div>
            </div>
            <div class="form-group">
                <label class="col-md-2 control-label" for="Contrasena">Contrasena</label>
                <div class="col-md-10">
                    <input class="form-control" id="Contrasena" name="Contrasena" type="password" />
                </div>
            </div>
            <div class="form-group">
                <div class="col-md-offset-2 col-md-10">
                    <input type="submit" value="Iniciar Sesion" class="btn btn-default" />
                </div>
            </div>
        </form>
    </div>
</body>
</html>
